name: Frame TV Schedule
version: "0.1.0"
slug: frame_tv_schedule
description: Generate a daily schedule artwork image and show it on a Samsung Frame TV during selected windows.
url: https://github.com/dcasale/frametv_schedule_ha_addon
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:calendar-clock
homeassistant_api: true
host_network: true
map:
  - type: addon_config
    read_only: false
ports:
  8099/tcp: null
options:
  calendar_entities: []
  timezone: America/Los_Angeles
  image_width: 3840
  image_height: 2160
  refresh_minutes: 30
  generate_time: "05:00"
  display_windows:
    - start: "06:00"
      end: "08:00"
    - start: "14:30"
      end: "16:30"
  restore_mode: previous_art
  fallback_art_id: ""
  fallback_image: ""
  tv_host: ""
  tv_name: Frame TV
  push_mode: dry_run
  weather_entity: ""
  privacy_mode: false
schema:
  calendar_entities:
    - str
  timezone: str
  image_width: int
  image_height: int
  refresh_minutes: int
  generate_time: str
  display_windows:
    - start: str
      end: str
  restore_mode: list(previous_art|fallback_art|none)
  fallback_art_id: str?
  fallback_image: str?
  tv_host: str?
  tv_name: str
  push_mode: list(dry_run|local_frame_api|home_assistant_service)
  weather_entity: str?
  privacy_mode: bool
