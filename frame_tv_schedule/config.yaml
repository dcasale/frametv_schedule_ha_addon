name: Frame TV Schedule
version: "0.2.23"
slug: frame_tv_schedule
description: Generate a daily schedule artwork image and show it on a Samsung Frame TV during selected windows.
url: https://github.com/dcasale/frametv_schedule_ha_addon
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:calendar-clock
homeassistant_api: true
hassio_api: true
host_network: true
map:
  - type: addon_config
    read_only: false
ports:
  8099/tcp: null
options:
  calendar_entity: ""
  additional_calendar_entity_1: ""
  additional_calendar_entity_2: ""
  timezone: America/Los_Angeles
  image_width: 3840
  image_height: 2160
  refresh_minutes: 30
  morning_window_start: "06:00"
  morning_window_end: "08:00"
  afternoon_window_start: "14:30"
  afternoon_window_end: "16:30"
  tv_host: ""
  tv_port: 8002
  tv_name: Frame TV
  tv_token_file: /config/samsung-frame-token.txt
  tv_timeout_seconds: 15
  tv_matte: none
  push_mode: dry_run
  weather_entity: ""
  weather_forecast_type: auto
  privacy_mode: false
  home_assistant_url: http://127.0.0.1:8123/api
  home_assistant_token: ""
schema:
  calendar_entity: str?
  additional_calendar_entity_1: str?
  additional_calendar_entity_2: str?
  timezone: str
  image_width: int
  image_height: int
  refresh_minutes: int
  morning_window_start: str
  morning_window_end: str
  afternoon_window_start: str
  afternoon_window_end: str
  tv_host: str?
  tv_port: int
  tv_name: str
  tv_token_file: str
  tv_timeout_seconds: int
  tv_matte: str
  push_mode: list(dry_run|local_frame_api|home_assistant_service)
  weather_entity: str?
  weather_forecast_type: list(auto|hourly|daily|twice_daily)
  privacy_mode: bool
  home_assistant_url: str
  home_assistant_token: password?
